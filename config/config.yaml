# Sentiment-Driven Portfolio Optimization System Configuration

# ==============================================================================
# DATA COLLECTION SETTINGS
# ==============================================================================
data_collection:
  # Stock tickers to analyze
  tickers:
    - AAPL    # Apple Inc.
    - GOOGL   # Alphabet Inc.
    - AMZN    # Amazon.com Inc.
    - MSFT    # Microsoft Corp.
    - TSLA    # Tesla Inc.
    - META    # Meta Platforms Inc.
    - NVDA    # NVIDIA Corp.
    - JPM     # JPMorgan Chase & Co.
  
  # Date range for historical data
  start_date: "2019-01-01"
  end_date: "2024-12-31"
  
  # Data source configuration
  data_source: "yahoo_finance"
  interval: "1d"  # Daily data
  
  # Output paths
  stock_prices_path: "data/raw/stock_prices.csv"
  sentiment_path: "data/raw/sentiment_news.csv"

# ==============================================================================
# SENTIMENT ANALYSIS SETTINGS
# ==============================================================================
sentiment_analysis:
  # Text preprocessing
  preprocessing:
    lowercase: true
    remove_urls: true
    remove_emails: true
    remove_special_chars: true
    remove_stopwords: true
    lemmatization: true
    min_word_length: 3
    remove_numbers: true
  
  # Feature extraction
  vectorizer:
    type: "tfidf"  # Options: tfidf, count, word2vec
    max_features: 5000
    ngram_range: [1, 2]
    min_df: 2        # Minimum document frequency
    max_df: 0.95     # Maximum document frequency
  
  # Model configuration
  model:
    type: "logistic_regression"  # Options: logistic_regression, naive_bayes, svm
    
    # Hyperparameters for LogisticRegression
    logistic_regression:
      C: 1.0
      max_iter: 1000
      solver: "lbfgs"
    
    # Hyperparameters for MultinomialNB
    naive_bayes:
      alpha: 1.0
    
    # Hyperparameters for LinearSVC
    svm:
      C: 1.0
      max_iter: 1000
  
  # Training configuration
  training:
    test_size: 0.2
    cv_folds: 5
    random_state: 42
    stratified: true
  
  # Aggregation method
  aggregation:
    method: "mean"  # Options: mean, weighted_mean, median
    handle_missing: "forward_fill"  # Options: forward_fill, zero, last_value
  
  # Output paths
  model_path: "results/models/sentiment_model.pkl"
  vectorizer_path: "results/models/vectorizer.pkl"
  daily_sentiment_path: "data/processed/daily_sentiment.csv"

# ==============================================================================
# FEATURE ENGINEERING SETTINGS
# ==============================================================================
feature_engineering:
  # Lagged features
  lagged_returns:
    - 1
    - 3
    - 5
    - 10
  
  # Moving averages
  moving_averages:
    - 5
    - 10
    - 20
  
  # Volatility windows
  volatility_windows:
    - 10
    - 20
    - 30
  
  # Technical indicators
  technical_indicators:
    - rsi           # Relative Strength Index
    - macd          # MACD
    - bollinger     # Bollinger Bands
  
  # Sentiment features
  sentiment_features:
    - current_sentiment
    - sentiment_momentum_1d
    - sentiment_momentum_5d
    - sentiment_std  # Sentiment volatility
  
  # Interaction features
  interaction_features: true
  
  # Data splitting
  data_split:
    train_ratio: 0.70
    val_ratio: 0.15
    test_ratio: 0.15
  
  # Feature scaling
  scaling:
    method: "standard"  # Options: standard, minmax, robust
    sentiment_range: [-1, 1]  # Keep sentiment in original range

# ==============================================================================
# RETURN PREDICTION SETTINGS
# ==============================================================================
return_prediction:
  # Target variable
  target:
    type: "next_day_return"  # Options: next_day_return, next_5day_return
    forward_shift: 1
  
  # Model configurations
  models:
    random_forest:
      n_estimators: 100
      max_depth: 15
      min_samples_split: 5
      min_samples_leaf: 2
      random_state: 42
    
    svm:
      kernel: "rbf"
      C: 1.0
      gamma: "scale"
    
    gradient_boosting:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 5
      subsample: 0.8
    
    linear_regression:
      fit_intercept: true
  
  # Hyperparameter tuning
  hyperparameter_tuning:
    method: "randomized_search"  # Options: grid_search, randomized_search
    cv_folds: 5
    n_iter: 20
    random_state: 42
  
  # Output paths
  predictions_path: "results/return_predictions.csv"
  model_path: "results/models/return_predictor.pkl"

# ==============================================================================
# RISK ESTIMATION SETTINGS
# ==============================================================================
risk_estimation:
  # Volatility estimation
  volatility:
    method: "exponential_weighted"  # Options: historical, exponential_weighted, garch
    span: 30
    annualize: true
  
  # Covariance matrix
  covariance:
    method: "shrinkage"  # Options: sample, shrinkage, exponential_weighted
    shrinkage_target: "identity"
    shrinkage_coefficient: null  # Auto-estimate if null
  
  # Risk metrics
  risk_metrics:
    - volatility
    - beta
    - var              # Value at Risk (95%)
    - cvar             # Conditional Value at Risk (95%)
    - max_drawdown
  
  # Output paths
  risk_estimates_path: "results/risk_estimates.csv"
  covariance_matrix_path: "results/covariance_matrix.csv"

# ==============================================================================
# PORTFOLIO OPTIMIZATION SETTINGS
# ==============================================================================
portfolio_optimization:
  # Risk-free rate (annualized)
  risk_free_rate: 0.02
  
  # Baseline Mean-Variance Optimization
  mean_variance:
    objective: "sharpe_ratio"  # Options: sharpe_ratio, min_volatility
    optimization_method: "SLSQP"
    
    # Constraints
    constraints:
      weights_sum_to_one: true
      no_short_selling: true
      max_weight_per_stock: 0.30
      min_weight_per_stock: 0.0
  
  # Sentiment-Enhanced Optimization
  sentiment_enhanced:
    enabled: true
    
    # Sentiment adjustment to returns
    sentiment_adjustment:
      method: "multiplicative"  # Options: multiplicative, additive
      # Multiplicative: Adjusted_Return = Historical_Return × (1 + λ × Sentiment)
      # Additive: Adjusted_Return = Historical_Return + λ × Sentiment × Historical_Std
    
    # Sentiment lambda values to test
    lambda_values:
      - 0.1
      - 0.3
      - 0.5
      - 0.7
    
    # Risk adjustment with sentiment
    risk_adjustment:
      enabled: true
      sensitivity: 0.1  # How much negative sentiment increases volatility
  
  # Rebalancing
  rebalancing:
    frequency: "monthly"  # Options: daily, weekly, monthly, quarterly
    lookback_window: 252  # Trading days for optimization
  
  # Output paths
  portfolio_weights_path: "results/portfolio_weights.csv"
  optimal_lambda_path: "results/optimal_lambda.csv"

# ==============================================================================
# BACKTESTING SETTINGS
# ==============================================================================
backtesting:
  # Backtesting parameters
  start_date: "2020-01-01"  # Start after training period
  end_date: "2024-12-31"
  
  # Walk-forward analysis
  optimization_window: 252  # Trading days
  rebalancing_frequency: "monthly"
  
  # Transaction costs
  transaction_costs:
    enabled: true
    percentage: 0.001  # 0.1% per trade
    fixed_cost: 0.0
  
  # Strategies to backtest
  strategies:
    - equal_weighted
    - market_index      # SPY
    - mean_variance_traditional
    - sentiment_enhanced_lambda_0.1
    - sentiment_enhanced_lambda_0.3
    - sentiment_enhanced_lambda_0.5
  
  # Performance metrics
  metrics:
    - cumulative_return
    - annualized_return
    - annualized_volatility
    - sharpe_ratio
    - sortino_ratio
    - max_drawdown
    - calmar_ratio
    - win_rate
    - information_ratio
  
  # Output paths
  backtest_results_path: "results/backtest_results.csv"
  portfolio_returns_path: "results/portfolio_returns.csv"

# ==============================================================================
# EVALUATION & ANALYSIS SETTINGS
# ==============================================================================
evaluation:
  # Statistical testing
  statistical_tests:
    - t_test              # Compare mean returns
    - kolmogorov_smirnov  # Compare distributions
    - sharpe_ratio_test   # Significant difference in Sharpe ratios
  
  # Confidence level for tests
  confidence_level: 0.95
  
  # Output paths
  evaluation_report_path: "results/evaluation_report.csv"
  statistical_tests_path: "results/statistical_tests.csv"

# ==============================================================================
# VISUALIZATION SETTINGS
# ==============================================================================
visualization:
  # Plot style
  style: "seaborn-v0_8-whitegrid"
  figure_dpi: 300
  figure_format: "png"
  
  # Color scheme
  color_palette: "husl"
  
  # Default figure size
  figure_size: [12, 6]
  
  # Output path for plots
  output_path: "results/plots/"
  
  # Plots to generate
  plots_enabled:
    - price_trends
    - correlation_heatmap
    - volatility_trends
    - sentiment_distribution
    - sentiment_price_overlay
    - efficient_frontier
    - cumulative_returns
    - drawdown_analysis
    - rolling_sharpe
    - monthly_returns_heatmap
    - risk_return_scatter

# ==============================================================================
# LOGGING & DEBUG SETTINGS
# ==============================================================================
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_file: "sentiport.log"
  console_output: true
  
# ==============================================================================
# PROJECT PATHS
# ==============================================================================
paths:
  project_root: "."
  src_dir: "src"
  data_dir: "data"
  results_dir: "results"
  notebooks_dir: "notebooks"
  config_dir: "config"
  
# ==============================================================================
# RANDOM SEEDS FOR REPRODUCIBILITY
# ==============================================================================
random_seed: 42
