version: '3.8'

services:
  # Backend API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentiport-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
    networks:
      - sentiport-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Nginx reverse proxy for static files and API routing
  nginx:
    image: nginx:alpine
    container_name: sentiport-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - sentiport-net
    depends_on:
      - api
    restart: unless-stopped

networks:
  sentiport-net:
    driver: bridge
